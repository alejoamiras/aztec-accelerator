[package]
name = "accelerator-server"
version = "1.0.7-rc.1"
description = "Headless Aztec Accelerator HTTP server (no GUI, no Tauri runtime)"
edition = "2021"
rust-version = "1.77.2"

# Sibling crate to `../src-tauri`. Lives in a separate Cargo package so that
# `tauri build` (which scans `cargo metadata` and bundles every `[[bin]]` in
# the same package as the desktop main into the .app's `MacOS/` folder) does
# NOT pick it up. This is the structural fix for the 1.0.1 macOS auto-update
# breakage: 1.0.1 silently included `accelerator-server` alongside the main
# binary in the desktop bundle, which changed the bundle signature shape and
# broke `amfid` revalidation on in-place updates from 1.0.0.

[dependencies]
# Depend on the GUI-agnostic `accelerator-core` (NOT the desktop crate): the headless server gets the
# shared server/authorization/config/bb/versions modules with NONE of the Tauri / webview / TLS-serving /
# rcgen dependency tree. This is the payoff of the core extraction. (core-extraction Phase 2)
accelerator-core = { path = "../core" }
parking_lot = "0.12"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
