<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aztec Accelerator Settings</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="assets/settings.js"></script>
</head>
<body>
  <div class="section">
    <h2>Approved Sites</h2>
    <ul id="origins" class="origin-list"></ul>
    <div id="origins-empty" class="empty-state">No approved sites yet.</div>
  </div>

  <div class="section">
    <h2>General</h2>
    <div class="row">
      <span id="autostart-label">Start on Login</span>
      <label class="toggle">
        <input type="checkbox" id="autostart" role="switch" aria-labelledby="autostart-label" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="row">
      <span id="auto-update-label">Auto-Update</span>
      <label class="toggle">
        <input type="checkbox" id="auto-update" role="switch" aria-labelledby="auto-update-label" />
        <span class="slider"></span>
      </label>
    </div>
    <div id="safari-row" class="row" hidden>
      <span id="safari-label">Safari Support</span>
      <label class="toggle">
        <input type="checkbox" id="safari" role="switch" aria-labelledby="safari-label" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="speed-section">
      <div class="speed-header">
        <span>Proving Speed</span>
        <span class="speed-value" id="speed-label">Full</span>
      </div>
      <div class="speed-track-wrap">
        <input type="range" id="speed" class="speed-slider" min="0" max="4" step="1" value="4" data-fill="4" aria-label="Proving Speed" />
        <div class="speed-ticks">
          <span>Low</span>
          <span>Light</span>
          <span>Balanced</span>
          <span>High</span>
          <span>Full</span>
        </div>
      </div>
      <div class="speed-description" id="speed-desc"></div>
    </div>
  </div>
</body>
</html>
