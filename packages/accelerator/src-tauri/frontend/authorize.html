<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Authorize Site</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="assets/authorize.js"></script>
</head>
<body>
  <div class="popup-container">
    <div class="popup-scroll">
      <h2>A site wants to use the Aztec Accelerator</h2>
      <div class="popup-detail">
        <div id="recognized" class="recognized-row" hidden>
          <span class="recognized-name"></span>
          <svg class="verified-check" aria-label="Verified by Aztec Accelerator maintainers" role="img" viewBox="0 0 24 24">
            <path d="M9 16.17 4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
        </div>
        <!-- F-014: the FULL canonical origin is shown as visible, selectable, keyboard-focusable text —
             never truncated (a truncation could hide the registrable domain and disguise a look-alike).
             dir=ltr + unicode-bidi isolation (CSS) prevent bidi visual reordering; punycode stays canonical
             (never decoded to Unicode homoglyphs). -->
        <div id="origin" class="origin-line" tabindex="0" dir="ltr" role="group" aria-label="Requesting origin"></div>
      </div>
      <label class="popup-remember">
        <input type="checkbox" id="remember" />
        Always allow this site
      </label>
    </div>
    <div class="popup-buttons">
      <button class="btn btn-secondary" id="deny">Deny</button>
      <button class="btn btn-primary" id="allow">Allow once</button>
    </div>
  </div>
</body>
</html>
