name: _E2E WebDriver (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: "GitHub Actions runner (e.g. ubuntu-latest, macos-latest)"
        required: true
        type: string
      mode:
        description: "'dev' or 'release'"
        required: false
        type: string
        default: "dev"

jobs:
  e2e-webdriver:
    name: WebDriver E2E (${{ inputs.mode }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.mode == 'release' && 35 || 25 }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/accelerator
    steps:
      - uses: actions/checkout@v6

      # ── Shared env setup (Bun, Rust toolchain + cache, Linux Tauri deps, bb sidecar) ──
      - uses: ./.github/actions/setup-accelerator
        with:
          rust-cache-key: e2e-webdriver-${{ inputs.mode }}
          rust-components: ""

      # ── Linux: WebDriver-specific extras (xvfb + tray + dbus) ──
      - name: Setup display (Linux)
        if: runner.os == 'Linux'
        working-directory: .
        run: |
          sudo apt-get install -y xvfb stalonetray dbus-x11
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1
          eval "$(dbus-launch --sh-syntax)"
          stalonetray -d none --geometry 1x1+0+0 --kludges force_icons_size &
          sleep 1
          {
            echo "DISPLAY=:99"
            echo "NO_AT_BRIDGE=1"
            echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS"
            echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID"
          } >> "$GITHUB_ENV"

      # ── Build (release mode only) ──
      - name: Build app (release)
        if: inputs.mode == 'release'
        working-directory: packages/accelerator/src-tauri
        run: cargo build --release --features webdriver

      # ── Launch app (single step, no platform conditionals) ──
      - name: Launch app
        run: |
          if [ "${{ inputs.mode }}" = "release" ]; then
            APP_CMD="./src-tauri/target/release/aztec-accelerator"
          else
            APP_CMD="bunx tauri dev --no-watch --features webdriver"
          fi
          $APP_CMD > /tmp/tauri.log 2>&1 &
          echo "TAURI_PID=$!" >> "$GITHUB_ENV"

      # ── Wait for readiness ──
      - name: Wait for app
        run: |
          echo "Waiting for WebDriver (:4445) and HTTP (:59833)..."
          # 300 iterations x 2s = 600s (10 min) — cold Rust cache can take 5+ min
          for i in $(seq 1 300); do
            if ! kill -0 "$TAURI_PID" 2>/dev/null; then
              echo "::error::App process crashed during startup"
              cat /tmp/tauri.log 2>/dev/null || true
              exit 1
            fi
            if curl -sf http://127.0.0.1:4445/status >/dev/null 2>&1 && \
               curl -sf http://127.0.0.1:59833/health >/dev/null 2>&1; then
              echo "Both servers ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Servers not ready after 600s"
          cat /tmp/tauri.log 2>/dev/null || true
          exit 1

      # ── Run tests ──
      - name: Run WebDriver E2E tests
        run: bun run test:e2e:webdriver

      # ── Regression guard: the background update check MUST be compiled out
      #    of webdriver builds. If the prompt window ever appears, it steals the
      #    active WebDriver context mid-test (see the 1.0.2 CI flake). Runs even
      #    on test failure so it always gives signal.
      - name: Assert no update prompt fired
        if: always()
        working-directory: .
        run: |
          if grep -q "Showing update prompt" /tmp/tauri.log 2>/dev/null; then
            echo "::error::Update prompt fired in a webdriver build — the update check is not gated. See implementations-plan/ci-reliability-2026-05-29/diagnosis.md"
            grep -n "Showing update prompt\|Update available" /tmp/tauri.log || true
            exit 1
          fi
          echo "OK — no update prompt in webdriver build"

      # ── Artifacts on failure ──
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: webdriver-e2e-logs-${{ runner.os }}-${{ inputs.mode }}
          path: /tmp/tauri.log
          if-no-files-found: ignore
          retention-days: 7

      # ── Cleanup ──
      - name: Cleanup
        if: always()
        run: |
          kill "$TAURI_PID" 2>/dev/null || true
          pkill -P "$TAURI_PID" 2>/dev/null || true
          pkill -f "aztec-accelerator" 2>/dev/null || true
          pkill -f stalonetray 2>/dev/null || true
          pkill -f Xvfb 2>/dev/null || true
          kill "$DBUS_SESSION_BUS_PID" 2>/dev/null || true
