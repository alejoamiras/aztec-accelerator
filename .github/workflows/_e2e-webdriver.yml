name: _E2E WebDriver (reusable)

on:
  workflow_call:
    inputs:
      runner:
        description: "GitHub Actions runner (e.g. ubuntu-latest, macos-latest)"
        required: true
        type: string
      mode:
        description: >-
          'dev' (tauri dev — fast, but is_dev()==true so it never runs the shipped custom-protocol path),
          'built-debug' (F-012/D8: `tauri build --debug` — a real custom-protocol binary that exercises the
          production asset+CSP path), or 'release' (release binary; note raw cargo build does NOT enable
          tauri's custom-protocol feature, so it is also is_dev()==true).
        required: false
        type: string
        default: "dev"

jobs:
  e2e-webdriver:
    name: WebDriver E2E (${{ inputs.mode }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.mode == 'release' && 35 || 25 }}
    permissions:
      contents: read
    defaults:
      run:
        # bash on every platform — Git Bash on windows-latest runs the same scripts
        # (the alternative, pwsh, would need every step rewritten).
        shell: bash
        working-directory: packages/accelerator
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # ── Shared env setup (Bun, Rust toolchain + cache, Linux Tauri deps, bb sidecar) ──
      - uses: ./.github/actions/setup-accelerator
        with:
          # F-012: -v2 busts the shared cache once — an earlier PR build could have cached a stale/empty
          # frontend asset embed (codegen output) that a later build restored instead of regenerating.
          rust-cache-key: e2e-webdriver-v2-${{ inputs.mode }}
          rust-components: ""

      # ── Linux: WebDriver-specific extras (xvfb + tray + dbus) ──
      - name: Setup display (Linux)
        if: runner.os == 'Linux'
        working-directory: .
        run: |
          sudo apt-get install -y xvfb stalonetray dbus-x11
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1
          eval "$(dbus-launch --sh-syntax)"
          stalonetray -d none --geometry 1x1+0+0 --kludges force_icons_size &
          sleep 1
          {
            echo "DISPLAY=:99"
            echo "NO_AT_BRIDGE=1"
            echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS"
            echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID"
          } >> "$GITHUB_ENV"

      # ── Build (release mode only) ──
      - name: Build app (release)
        if: inputs.mode == 'release'
        working-directory: packages/accelerator/src-tauri
        run: cargo build --release --features webdriver

      # ── Build (dev — plain `cargo build`, run DIRECTLY, no `tauri dev`. F-012 ROOT CAUSE: `tauri dev`
      #    injects a dev-server devUrl (e.g. http://127.0.0.1:1430), which makes tauri-codegen embed an EMPTY
      #    asset set (context.rs: `dev && dev_url.is_some()`), so the webview's tauri:// protocol 404s every
      #    asset. A plain `cargo build` has dev_url=None → codegen embeds frontendDist fully → tauri:// works.
      #    setup-accelerator already built the frontend bundles the build.rs guard needs. ──
      - name: Build app (dev)
        if: inputs.mode == 'dev'
        working-directory: packages/accelerator/src-tauri
        run: cargo build --features webdriver

      # ── Build (built-debug — F-012/D8: a real `tauri build` enables tauri's custom-protocol feature, so
      #    the webdriver run exercises the SHIPPED asset/CSP path that `tauri dev` and raw `cargo build` skip.
      #    Runs from packages/accelerator so tauri's beforeBuildCommand (bun run frontend:build) fires. ──
      - name: Build app (built-debug)
        if: inputs.mode == 'built-debug'
        run: bunx tauri build --debug --no-bundle --features webdriver

      # ── Launch app (single step, no platform conditionals) ──
      - name: Launch app
        run: |
          EXE=""
          [ "$RUNNER_OS" = "Windows" ] && EXE=".exe"
          case "${{ inputs.mode }}" in
            release)     APP_CMD="./src-tauri/target/release/aztec-accelerator$EXE" ;;
            built-debug) APP_CMD="./src-tauri/target/debug/aztec-accelerator$EXE" ;;
            *)           APP_CMD="./src-tauri/target/debug/aztec-accelerator$EXE" ;; # dev: built above

          esac
          $APP_CMD > /tmp/tauri.log 2>&1 &
          echo "TAURI_PID=$!" >> "$GITHUB_ENV"

      # ── Wait for readiness ──
      - name: Wait for app
        run: |
          echo "Waiting for WebDriver (:4445) and HTTP (:59833)..."
          # 450 iterations x 2s = 900s (15 min) — cold Rust cache, esp. a Windows
          # debug compile of the webdriver feature, can be slow on first run.
          for i in $(seq 1 450); do
            if ! kill -0 "$TAURI_PID" 2>/dev/null; then
              echo "::error::App process crashed during startup"
              cat /tmp/tauri.log 2>/dev/null || true
              exit 1
            fi
            if curl -sf http://127.0.0.1:4445/status >/dev/null 2>&1 && \
               curl -sf http://127.0.0.1:59833/health >/dev/null 2>&1; then
              echo "Both servers ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Servers not ready after 900s"
          cat /tmp/tauri.log 2>/dev/null || true
          exit 1

      # ── F-012 diagnostic: confirm the frontend assets exist on disk + surface any app startup errors
      #    (e.g. "asset not found") inline. Temporary; safe to keep as a fast signal for asset regressions.
      - name: Diagnose frontend assets
        if: always()
        run: |
          echo "── src-tauri/frontend ──"; ls -la src-tauri/frontend || true
          echo "── src-tauri/frontend/assets ──"; ls -la src-tauri/frontend/assets || true
          echo "── app startup errors (tauri.log) ──"
          grep -iE 'asset not found|ERROR|panic' /tmp/tauri.log 2>/dev/null | head -20 || echo "(no tauri.log errors)"

      # ── Run tests ──
      - name: Run WebDriver E2E tests
        run: bun run test:e2e:webdriver

      # ── Regression guard: the background update check MUST be compiled out
      #    of webdriver builds. If the prompt window ever appears, it steals the
      #    active WebDriver context mid-test (see the 1.0.2 CI flake). Runs even
      #    on test failure so it always gives signal.
      - name: Assert no update prompt fired
        if: always()
        working-directory: .
        run: |
          if grep -q "Showing update prompt" /tmp/tauri.log 2>/dev/null; then
            echo "::error::Update prompt fired in a webdriver build — the update check is not gated. See implementations-plan/ci-reliability-2026-05-29/diagnosis.md"
            grep -n "Showing update prompt\|Update available" /tmp/tauri.log || true
            exit 1
          fi
          echo "OK — no update prompt in webdriver build"

      # ── Artifacts on failure ──
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: webdriver-e2e-logs-${{ runner.os }}-${{ inputs.mode }}
          path: /tmp/tauri.log
          if-no-files-found: ignore
          retention-days: 7

      # ── Cleanup ──
      - name: Cleanup
        if: always()
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Git Bash has no pkill; use taskkill on the native processes (// escapes
            # the flags so MSYS doesn't path-mangle them).
            taskkill //F //IM aztec-accelerator.exe 2>/dev/null || true
            taskkill //F //IM msedgewebview2.exe 2>/dev/null || true
          else
            kill "$TAURI_PID" 2>/dev/null || true
            pkill -P "$TAURI_PID" 2>/dev/null || true
            pkill -f "aztec-accelerator" 2>/dev/null || true
            pkill -f stalonetray 2>/dev/null || true
            pkill -f Xvfb 2>/dev/null || true
            kill "$DBUS_SESSION_BUS_PID" 2>/dev/null || true
          fi
