name: Backport to Nightlies

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: backport-nightlies
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - "packages/sdk/**"
              - "packages/playground/**"

      - name: Cherry-pick to nightlies
        if: steps.filter.outputs.relevant == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="backport/nightlies-pr-${PR_NUMBER}"

          git checkout -b "$BRANCH" origin/nightlies

          if git cherry-pick --no-commit -m 1 "$MERGE_SHA"; then
            if git diff --cached --quiet; then
              echo "Cherry-pick produced no changes — already applied on nightlies"
            else
              git commit -m "backport: ${PR_TITLE} (#${PR_NUMBER})"
              git push origin "$BRANCH"
              gh pr create \
                --base nightlies \
                --head "$BRANCH" \
                --title "backport: ${PR_TITLE} (#${PR_NUMBER})" \
                --body "Automated backport of #${PR_NUMBER} from main to nightlies." \
                --label backport
              gh pr merge "$BRANCH" --auto --squash --delete-branch \
                || echo "::warning::Auto-merge could not be enabled — merge manually"
            fi
          else
            git cherry-pick --abort || true
            echo "::warning::Cherry-pick of #${PR_NUMBER} to nightlies has conflicts — skipping"
          fi
