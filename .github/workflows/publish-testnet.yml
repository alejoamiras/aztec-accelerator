name: Publish Testnet

on:
  workflow_dispatch:
    inputs:
      skip_sdk_publish:
        description: "Deploy the playground only — skip re-publishing the SDK to npm"
        required: false
        type: boolean
        default: false

# Queue, never cancel: a canceled in-flight run can strand an irreversible npm publish
# half-done. If publish-sdk fails AFTER its npm publish step, never blind-redispatch —
# check `npm view @alejoamiras/aztec-accelerator versions` first; a redispatch mints a
# `-revision.N` version by design.
concurrency:
  group: publish-testnet
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      playground: ${{ steps.filter.outputs.playground }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            sdk:
              - "packages/sdk/**"
            playground:
              - "packages/playground/**"

  e2e:
    uses: ./.github/workflows/_e2e.yml
    with:
      ref: ${{ github.sha }}
      # Publish-time gate exercises the NATIVE bb path (asserts `transmit`), not just the
      # WASM fallback — the artifact being published deserves the same proof as the PR gate.
      build_accelerator: true

  publish-sdk:
    needs: [changes, e2e]
    # Skip when deploying the playground only. latest:false — the SDK publishes on the
    # `testnet` dist-tag; npm `latest` moves ONLY via promote-latest.yml, after the live
    # acceptance smoke.
    if: (needs.changes.outputs.sdk == 'true' || github.event_name == 'workflow_dispatch') && inputs.skip_sdk_publish != true
    uses: ./.github/workflows/_publish-sdk.yml
    with:
      dist_tag: testnet
      latest: false
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-app:
    # Deploy playground unless E2E explicitly failed — skip on cancel, proceed on skip/success.
    if: ${{ !cancelled() && needs.e2e.result != 'failure' }}
    needs: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Build playground
        env:
          AZTEC_NODE_URL: ${{ secrets.TESTNET_AZTEC_NODE_URL }}
        run: bun run --cwd packages/playground build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy playground to S3
        run: |
          aws s3 sync packages/playground/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/playground/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/playground/*"
