name: "Lint: Infra & Workflows"

on:
  workflow_dispatch:
  pull_request:
    branches: [main, security-hardening]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      workflows: ${{ steps.override.outputs.workflows || steps.filter.outputs.workflows }}
      shell: ${{ steps.override.outputs.shell || steps.filter.outputs.shell }}
      tofu: ${{ steps.override.outputs.tofu || steps.filter.outputs.tofu }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
            shell:
              - 'infra/**/*.sh'
            tofu:
              - 'infra/tofu/**/*.tf'
      - name: Override for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: override
        run: |
          {
            echo "workflows=true"
            echo "shell=true"
            echo "tofu=true"
          } >> "$GITHUB_OUTPUT"

  actionlint:
    name: Lint workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        id: actionlint-cache
        with:
          path: ./actionlint
          key: actionlint-v1.7.11-${{ runner.os }}
      - name: Download actionlint
        if: steps.actionlint-cache.outputs.cache-hit != 'true'
        id: get_actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.11/scripts/download-actionlint.bash)
        shell: bash
      - name: Run actionlint
        run: |
          ACTIONLINT="${{ steps.get_actionlint.outputs.executable }}"
          [ -z "$ACTIONLINT" ] && ACTIONLINT="./actionlint"
          "$ACTIONLINT" -color
        shell: bash

  shellcheck:
    name: Shellcheck
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: shellcheck infra/*.sh

  tofu:
    name: Lint OpenTofu
    needs: changes
    if: needs.changes.outputs.tofu == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '1.10.0'
      - name: Format check
        run: tofu -chdir=infra/tofu fmt -check -diff
      - name: Init (providers only)
        run: tofu -chdir=infra/tofu init -backend=false -input=false
      - name: Validate
        run: tofu -chdir=infra/tofu validate

  status:
    name: Actionlint Status
    if: always()
    needs: [changes, actionlint, shellcheck, tofu]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          # This job is a REQUIRED check on main, so it must fail closed. If the
          # `changes` filter itself didn't succeed we can't trust the gating, and
          # a cancelled lint job must NOT read as pass (only `skipped` = no
          # relevant changes is a legitimate pass).
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "changes job did not succeed (${{ needs.changes.result }}) — cannot trust lint gating"
            exit 1
          fi
          for r in "actionlint:${{ needs.actionlint.result }}" \
                   "shellcheck:${{ needs.shellcheck.result }}" \
                   "tofu:${{ needs.tofu.result }}"; do
            name="${r%%:*}"; res="${r#*:}"
            if [ "$res" = "failure" ] || [ "$res" = "cancelled" ]; then
              echo "$name lint $res"
              exit 1
            fi
          done
          echo "All lint checks passed or skipped (no relevant changes)"
