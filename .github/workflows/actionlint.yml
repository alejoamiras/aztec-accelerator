name: "Lint: Infra & Workflows"

on:
  workflow_dispatch:
  pull_request:
    branches: [main, security-hardening]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      workflows: ${{ steps.override.outputs.workflows || steps.filter.outputs.workflows }}
      shell: ${{ steps.override.outputs.shell || steps.filter.outputs.shell }}
      tofu: ${{ steps.override.outputs.tofu || steps.filter.outputs.tofu }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
            shell:
              - 'infra/**/*.sh'
            tofu:
              - 'infra/tofu/**/*.tf'
      - name: Override for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: override
        run: |
          {
            echo "workflows=true"
            echo "shell=true"
            echo "tofu=true"
          } >> "$GITHUB_OUTPUT"

  actionlint:
    name: Lint workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      # F-015: download a PINNED actionlint release and verify its SHA-256 instead of piping a
      # moving `download-actionlint.bash` into bash. No binary cache (a poisoned cache would be a
      # trusted executable); the ~2 MB download each run is negligible. The prior setup was also
      # mislabeled — the v1.7.11 installer defaults to actionlint 1.7.10 while the cache key said
      # 1.7.11. Pinned to 1.7.12 (matches the local lint gate).
      - name: Download + verify actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL "$url" -o actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
        shell: bash
      - name: Run actionlint
        run: ./actionlint -color
        shell: bash

  shellcheck:
    name: Shellcheck
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run shellcheck
        # F-015/C0: `shellcheck infra/*.sh` errors when the glob matches nothing (no infra scripts
        # today), which fails the job on workflow_dispatch. `find … | xargs -0r` is empty-safe AND
        # recursive — matching the `infra/**/*.sh` paths-filter so a nested script can't trigger the
        # job yet silently skip linting. `xargs -0r` propagates shellcheck's real exit code (the old
        # `&& … || echo` form would have masked a genuine failure as success).
        run: find infra -type f -name '*.sh' -print0 | xargs -0r shellcheck

  tofu:
    name: Lint OpenTofu
    needs: changes
    if: needs.changes.outputs.tofu == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: '1.10.0'
      - name: Format check
        run: tofu -chdir=infra/tofu fmt -check -diff
      - name: Init (providers only)
        run: tofu -chdir=infra/tofu init -backend=false -input=false
      - name: Validate
        run: tofu -chdir=infra/tofu validate

  status:
    name: Actionlint Status
    if: always()
    needs: [changes, actionlint, shellcheck, tofu]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          # This job is a REQUIRED check on main, so it must fail closed. If the
          # `changes` filter itself didn't succeed we can't trust the gating, and
          # a cancelled lint job must NOT read as pass (only `skipped` = no
          # relevant changes is a legitimate pass).
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "changes job did not succeed (${{ needs.changes.result }}) — cannot trust lint gating"
            exit 1
          fi
          for r in "actionlint:${{ needs.actionlint.result }}" \
                   "shellcheck:${{ needs.shellcheck.result }}" \
                   "tofu:${{ needs.tofu.result }}"; do
            name="${r%%:*}"; res="${r#*:}"
            if [ "$res" = "failure" ] || [ "$res" = "cancelled" ]; then
              echo "$name lint $res"
              exit 1
            fi
          done
          echo "All lint checks passed or skipped (no relevant changes)"
