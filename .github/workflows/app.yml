name: App

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

# Cancel a superseded in-flight run when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      relevant: ${{ steps.override.outputs.relevant || steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'packages/playground/**'
              - 'packages/sdk/**'
              - 'tsconfig.json'
              - 'biome.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/app.yml'
              - '.github/workflows/_e2e-app.yml'
              - '.github/actions/setup-aztec/**'
              - '.github/actions/start-services/**'
      - name: Override for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: override
        run: echo "relevant=true" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint
      # Typecheck all three playground graphs: src (browser types), tests (bun types), and
      # e2e/config (node types) — `vite build` and `bun test` check none of them. Catches
      # @aztec API breaks at compile time, e.g. the rc.2 AztecAddress.fromBigInt removal.
      - run: bun run --cwd packages/playground typecheck
      # Typecheck the FPC deploy/fund scripts too (same escape class, own tsconfig).
      - run: bun run --cwd packages/playground typecheck:scripts

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --cwd packages/playground test:unit

  mocked-e2e:
    name: Mocked E2E
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # Headroom for a cold Playwright fill (~30 min) on a cache miss; ~1-2 min on
    # a cache hit, so this ceiling is a safety net normal runs never approach.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - uses: ./.github/actions/playwright-cache
      - run: bun run --cwd packages/playground test:e2e

  production-smoke:
    name: Production Build Smoke
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # Headroom for a cold Playwright fill (~30 min) on a cache miss; ~1-2 min on
    # a cache hit, so this ceiling is a safety net normal runs never approach.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - uses: ./.github/actions/playwright-cache
      - run: bun run --cwd packages/playground test:e2e:production-smoke

  local-network-e2e:
    name: Local Network E2E
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    uses: ./.github/workflows/_e2e-app.yml
    with:
      test_script: "test:e2e:local-network"

  app-status:
    name: App Status
    if: always()
    needs: [changes, lint, unit-tests, mocked-e2e, production-smoke, local-network-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          results="${{ needs.changes.result }} ${{ needs.lint.result }} ${{ needs.unit-tests.result }} ${{ needs.mocked-e2e.result }} ${{ needs.production-smoke.result }} ${{ needs.local-network-e2e.result }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
