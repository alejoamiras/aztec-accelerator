name: Release Accelerator

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.0)"
        required: true
        type: string

concurrency:
  group: release-accelerator
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tag
        id: tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          TAG="accelerator-v${INPUT_VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping creation"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: tag
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            platform: macos-x86_64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux-x86_64
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/accelerator/src-tauri -> target
          key: release-${{ matrix.target }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev

      - name: Patch version in tauri.conf.json
        env:
          RELEASE_VERSION: ${{ needs.tag.outputs.version }}
        run: |
          cd packages/accelerator/src-tauri
          bun -e "
            const conf = JSON.parse(await Bun.file('tauri.conf.json').text());
            conf.version = process.env.RELEASE_VERSION;
            await Bun.write('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Patch version in Cargo.toml
        env:
          RELEASE_VERSION: ${{ needs.tag.outputs.version }}
        run: |
          cd packages/accelerator/src-tauri
          sed -i.bak "s/^version = \".*\"/version = \"$RELEASE_VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Copy bb sidecar
        run: bun run --cwd packages/accelerator prebuild

      - name: Build Tauri bundle
        run: npx @tauri-apps/cli@^2 build --target ${{ matrix.target }}
        working-directory: packages/accelerator
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: accelerator-${{ matrix.platform }}
          path: |
            packages/accelerator/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            packages/accelerator/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            packages/accelerator/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            packages/accelerator/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            packages/accelerator/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig
            packages/accelerator/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.sig

  release:
    name: Create GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Flatten and rename artifacts
        env:
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          mkdir -p release-files

          echo "All artifacts:"
          find artifacts -type f | sort

          # DMGs (for direct download)
          find artifacts -name '*_aarch64.dmg' -exec mv {} "release-files/Aztec-Accelerator-${VERSION}-macOS-Apple-Silicon.dmg" \;
          find artifacts -name '*_x64.dmg'     -exec mv {} "release-files/Aztec-Accelerator-${VERSION}-macOS-Intel.dmg" \;

          # Updater .tar.gz (macOS — each arch artifact is in its own subdirectory)
          find artifacts/accelerator-macos-arm64 -name '*.app.tar.gz' -exec mv {} "release-files/Aztec-Accelerator-${VERSION}-macOS-Apple-Silicon.app.tar.gz" \;
          find artifacts/accelerator-macos-x86_64 -name '*.app.tar.gz' -exec mv {} "release-files/Aztec-Accelerator-${VERSION}-macOS-Intel.app.tar.gz" \;

          # Linux
          find artifacts -name '*_amd64.deb'      -exec mv {} "release-files/Aztec-Accelerator-${VERSION}-Linux-x86_64.deb" \;
          find artifacts -name '*_amd64.AppImage'  -exec mv {} "release-files/Aztec-Accelerator-${VERSION}-Linux-x86_64.AppImage" \;

          echo "Release files:"
          ls -la release-files/

          # Assert all expected files exist — fail fast if any platform is missing
          EXPECTED=(
            "Aztec-Accelerator-${VERSION}-macOS-Apple-Silicon.dmg"
            "Aztec-Accelerator-${VERSION}-macOS-Intel.dmg"
            "Aztec-Accelerator-${VERSION}-macOS-Apple-Silicon.app.tar.gz"
            "Aztec-Accelerator-${VERSION}-macOS-Intel.app.tar.gz"
            "Aztec-Accelerator-${VERSION}-Linux-x86_64.deb"
            "Aztec-Accelerator-${VERSION}-Linux-x86_64.AppImage"
          )
          for f in "${EXPECTED[@]}"; do
            if [ ! -f "release-files/$f" ]; then
              echo "::error::Missing expected release artifact: $f"
              exit 1
            fi
          done
          echo "All ${#EXPECTED[@]} expected artifacts present"

      - name: Generate latest.json for auto-updater
        env:
          VERSION: ${{ needs.tag.outputs.version }}
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
        run: |
          REPO="alejoamiras/aztec-accelerator"
          BASE_URL="https://github.com/${REPO}/releases/download/${RELEASE_TAG}"

          # Read signatures from .sig files in artifacts
          DARWIN_AARCH64_SIG=$(find artifacts/accelerator-macos-arm64 -name '*.app.tar.gz.sig' -exec cat {} \; 2>/dev/null || echo "")
          DARWIN_X86_64_SIG=$(find artifacts/accelerator-macos-x86_64 -name '*.app.tar.gz.sig' -exec cat {} \; 2>/dev/null || echo "")
          LINUX_APPIMAGE_SIG=$(find artifacts -name '*.AppImage.sig' -exec cat {} \; 2>/dev/null || echo "")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg darwin_aarch64_sig "$DARWIN_AARCH64_SIG" \
            --arg darwin_aarch64_url "${BASE_URL}/Aztec-Accelerator-${VERSION}-macOS-Apple-Silicon.app.tar.gz" \
            --arg darwin_x86_64_sig "$DARWIN_X86_64_SIG" \
            --arg darwin_x86_64_url "${BASE_URL}/Aztec-Accelerator-${VERSION}-macOS-Intel.app.tar.gz" \
            --arg linux_x86_64_sig "$LINUX_APPIMAGE_SIG" \
            --arg linux_x86_64_url "${BASE_URL}/Aztec-Accelerator-${VERSION}-Linux-x86_64.AppImage" \
            '{
              version: $version,
              notes: ("Aztec Accelerator " + $version),
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $darwin_aarch64_sig, url: $darwin_aarch64_url },
                "darwin-x86_64": { signature: $darwin_x86_64_sig, url: $darwin_x86_64_url },
                "linux-x86_64": { signature: $linux_x86_64_sig, url: $linux_x86_64_url }
              }
            }' > release-files/latest.json

          echo "Generated latest.json:"
          cat release-files/latest.json

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.tag.outputs.tag }}
          VERSION: ${{ needs.tag.outputs.version }}
        run: |
          # Collect all bundle files into a null-delimited list
          mapfile -d '' FILES < <(find release-files -type f \( -name '*.dmg' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.app.tar.gz' -o -name 'latest.json' \) -print0)

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No artifacts found!"
            exit 1
          fi

          echo "Uploading ${#FILES[@]} files:"
          printf '  %s\n' "${FILES[@]}"

          # Delete existing release if present (clean slate)
          if gh release view "$RELEASE_TAG" &>/dev/null; then
            echo "Release $RELEASE_TAG already exists, deleting..."
            gh release delete "$RELEASE_TAG" --yes
          fi

          echo "Creating release $RELEASE_TAG..."

          # Write release notes to file (avoids heredoc/YAML indentation issues)
          cat > /tmp/release-notes.md << NOTES
          ## Aztec Accelerator ${VERSION}

          Native proving accelerator for Aztec transactions.

          ### Downloads

          | Platform | File |
          |----------|------|
          | **macOS (Apple Silicon)** | \`Aztec-Accelerator-${VERSION}-macOS-Apple-Silicon.dmg\` |
          | **macOS (Intel)** | \`Aztec-Accelerator-${VERSION}-macOS-Intel.dmg\` |
          | **Linux (Debian/Ubuntu)** | \`Aztec-Accelerator-${VERSION}-Linux-x86_64.deb\` |
          | **Linux (Other distros)** | \`Aztec-Accelerator-${VERSION}-Linux-x86_64.AppImage\` |

          ### macOS: First Launch

          The app is **code-signed and notarized** by Apple. Double-click the DMG, drag to Applications, and launch.

          ### Aztec Version
          Built against Aztec \`${VERSION}\`.
          NOTES

          # Strip leading whitespace from each line (YAML indentation artifact)
          sed -i 's/^          //' /tmp/release-notes.md

          gh release create "$RELEASE_TAG" \
            --title "Aztec Accelerator $VERSION" \
            --notes-file /tmp/release-notes.md \
            "${FILES[@]}"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload latest.json to S3 for auto-updater
        run: |
          # Uploaded under /landing/ because CloudFront routes aztec-accelerator.dev → /landing/
          aws s3 cp release-files/latest.json s3://${{ secrets.S3_BUCKET_NAME }}/landing/releases/latest.json \
            --content-type application/json \
            --cache-control "max-age=300"
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/releases/latest.json"

  bump-source:
    name: Bump source version
    needs: [tag, release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compute next version
        id: next
        env:
          RELEASED: ${{ needs.tag.outputs.version }}
        run: |
          # If rc release (1.0.0-rc.7), bump rc number (1.0.0-rc.8)
          # If stable release (1.0.0), bump patch and start rc.1 (1.0.1-rc.1)
          NEXT=$(bun -e "
            const v = process.env.RELEASED;
            const rcMatch = v.match(/^(.+)-rc\.(\d+)$/);
            if (rcMatch) {
              console.log(rcMatch[1] + '-rc.' + (Number(rcMatch[2]) + 1));
            } else {
              const parts = v.split('.');
              parts[2] = String(Number(parts[2]) + 1);
              console.log(parts.join('.') + '-rc.1');
            }
          ")
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Released $RELEASED → next source: $NEXT"

      - name: Update source files
        env:
          NEXT_VERSION: ${{ steps.next.outputs.version }}
        run: |
          cd packages/accelerator/src-tauri

          # Patch tauri.conf.json
          bun -e "
            const conf = JSON.parse(await Bun.file('tauri.conf.json').text());
            conf.version = process.env.NEXT_VERSION;
            await Bun.write('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          # Patch Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$NEXT_VERSION\"/" Cargo.toml

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          NEXT_VERSION: ${{ steps.next.outputs.version }}
          RELEASED: ${{ needs.tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/bump-accelerator-${NEXT_VERSION}"
          git checkout -b "$BRANCH"
          git add packages/accelerator/src-tauri/tauri.conf.json packages/accelerator/src-tauri/Cargo.toml
          git commit -m "chore(accelerator): bump source version to ${NEXT_VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore(accelerator): bump source version to ${NEXT_VERSION}" \
            --body "Automated post-release version bump after releasing ${RELEASED}."

          gh pr merge "$BRANCH" --auto --squash --delete-branch
