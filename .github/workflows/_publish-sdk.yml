name: _Publish SDK (reusable)

# npm `latest` NEVER moves through this workflow's direct dispatch: the dispatch inputs
# deliberately omit `latest` and constrain `dist_tag` to a non-latest choice list, and the
# guard step below hard-fails on anything else (both trigger paths). Promotion is a separate,
# smoke-gated, tag-only step: promote-latest.yml.
on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: "npm dist-tag"
        required: true
        type: choice
        options:
          - testnet
          - nightlies
        default: testnet
  workflow_call:
    inputs:
      dist_tag:
        description: "npm dist-tag (testnet or nightlies — guarded below)"
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: true

# Shared with promote-latest.yml: an in-flight npm mutation is never canceled (a canceled
# half-done publish strands irreversible state). Caveat (GitHub semantics): at most ONE
# run waits per group — a newer dispatch replaces a still-queued run; confirm your run
# started after dispatching.
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish SDK
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write # needed for --provenance (Sigstore attestation)
      contents: write
    steps:
      - name: Guard dist_tag (npm 'latest' moves only via promote-latest.yml)
        env:
          DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          case "$DIST_TAG" in
            testnet|nightlies) echo "dist_tag=$DIST_TAG ok" ;;
            *) echo "::error::dist_tag '$DIST_TAG' is not allowed here"; exit 1 ;;
          esac

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK
        run: bun run --cwd packages/sdk build

      - name: Read Aztec version
        id: aztec-version
        working-directory: packages/sdk
        run: |
          VERSION=$(node -p "require('./package.json').dependencies['@aztec/stdlib']")
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "::error::@aztec/stdlib not found in packages/sdk/package.json dependencies"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Aztec version: $VERSION"

      - name: Determine SDK publish version
        id: sdk-version
        env:
          AZTEC_VERSION: ${{ steps.aztec-version.outputs.version }}
        run: |
          VERSION=$(bun scripts/get-sdk-publish-version.ts "$AZTEC_VERSION")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "SDK publish version: $VERSION"

      - name: Set SDK version and fix exports for npm
        working-directory: packages/sdk
        env:
          VERSION: ${{ steps.sdk-version.outputs.version }}
        run: |
          node -e "
            const p = require('./package.json');
            p.version = process.env.VERSION;
            p.main = './dist/index.js';
            p.types = './dist/index.d.ts';
            p.exports = { '.': { types: './dist/index.d.ts', default: './dist/index.js' } };
            delete p.publishConfig.exports;
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "

      # If this step fails AFTER npm accepted the publish, never blind-redispatch: check
      # `npm view @alejoamiras/aztec-accelerator versions` first — a redispatch mints a
      # `-revision.N` version by design (get-sdk-publish-version.ts).
      - name: Publish to npm
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ inputs.dist_tag }}
        run: npm publish --provenance --access public --tag "$DIST_TAG" --workspaces=false

      - name: Create git tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.sdk-version.outputs.version }}
          AZTEC_VERSION: ${{ steps.aztec-version.outputs.version }}
          DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          TAG="@alejoamiras/aztec-accelerator@${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # F2 (full-branch audit): NEVER suppress tag/push failures. The old `git tag/push || true` let a
          # pre-claimed tag (an attacker pushing $TAG at a different commit) survive silently, then
          # `gh release create` below blessed that wrong-commit tag while npm published from HEAD.
          # We query the REMOTE directly with `git ls-remote` (which — unlike `git fetch ... || true` —
          # exits NON-ZERO on network/auth failure, so a masked error can't let a stale local tag pass) and
          # require any existing remote tag to resolve to the exact commit we publish (HEAD).
          EXPECTED_SHA="$(git rev-parse HEAD)"
          # Ask for both the ref and its peeled (^{}) form; an annotated tag reports the commit on the
          # `^{}` line, a lightweight tag (what `git tag` creates) reports the commit on the plain line.
          REMOTE_REFS="$(git ls-remote origin "refs/tags/$TAG" "refs/tags/$TAG^{}")"
          if [ -n "$REMOTE_REFS" ]; then
            REMOTE_SHA="$(printf '%s\n' "$REMOTE_REFS" | awk '/\^\{\}$/ {print $1; exit}')"
            [ -z "$REMOTE_SHA" ] && REMOTE_SHA="$(printf '%s\n' "$REMOTE_REFS" | awk 'NR==1 {print $1}')"
            if [ "$REMOTE_SHA" != "$EXPECTED_SHA" ]; then
              echo "::error::Tag $TAG already exists on origin at $REMOTE_SHA, not the published commit ($EXPECTED_SHA); aborting"
              exit 1
            fi
            echo "Tag $TAG already on origin at the expected commit; reusing it"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if [ "$VERSION" = "$AZTEC_VERSION" ]; then
            NOTES="Aligned with Aztec ${DIST_TAG} version \`${AZTEC_VERSION}\`."
          else
            NOTES="SDK revision for Aztec ${DIST_TAG} version \`${AZTEC_VERSION}\`."
          fi

          # ALWAYS --latest=false: `inputs.latest` governs the npm dist-tag only. The repo's GitHub
          # "Latest" badge belongs to accelerator releases — the 4.2.0-revision.2 SDK release stole
          # it from accelerator-v1.0.5 (2026-06-11), breaking the updater smokes' N-1 resolution
          # and the releases/latest URL.
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$NOTES" \
            --latest=false
