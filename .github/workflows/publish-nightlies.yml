name: Publish Nightlies

# F-005 (C5): the `nightlies` branch is UNUSED (owner decision 2026-07-14). This workflow is
# workflow_dispatch-only and mixes an irreversible npm publish (`_publish-sdk.yml`) with an AWS deploy;
# after the F-005 cutover its AWS role + `AWS_ROLE_ARN` secret are gone, so a stray dispatch could
# npm-publish while the deploy fails (a partial, irreversible run). Every job is therefore hard-disabled
# disabled: every job is gated on the repo variable `NIGHTLIES_ENABLED == 'true'`, which is NOT set, so
# nothing runs. Do NOT re-enable (set that var) without FIRST adding a dedicated `playground-nightly/*`
# deploy role + `AWS_ROLE_ARN_NIGHTLIES` secret (see C5 Ask A6).

on:
  workflow_dispatch:

concurrency:
  group: publish-nightlies
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    if: ${{ vars.NIGHTLIES_ENABLED == 'true' }} # F-005: disabled (nightlies unused)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      sdk: ${{ steps.filter.outputs.sdk }}
      playground: ${{ steps.filter.outputs.playground }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            sdk:
              - "packages/sdk/**"
            playground:
              - "packages/playground/**"

  e2e:
    if: ${{ vars.NIGHTLIES_ENABLED == 'true' }} # F-005: disabled (nightlies unused)
    uses: ./.github/workflows/_e2e.yml
    with:
      ref: ${{ github.sha }}

  publish-sdk:
    needs: [changes, e2e]
    if: ${{ vars.NIGHTLIES_ENABLED == 'true' }} # F-005: disabled (nightlies unused; was: sdk changed || dispatch)
    uses: ./.github/workflows/_publish-sdk.yml
    with:
      dist_tag: nightlies
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-app:
    if: ${{ vars.NIGHTLIES_ENABLED == 'true' }} # F-005: disabled (nightlies unused; was: !cancelled() && e2e != failure)
    needs: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile

      - name: Build playground
        env:
          AZTEC_NODE_URL: ${{ secrets.TESTNET_AZTEC_NODE_URL }}
        run: bun run --cwd packages/playground build

      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_NIGHTLIES }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy playground to S3
        run: |
          aws s3 sync packages/playground/dist/ s3://${{ secrets.S3_BUCKET_NAME }}/playground-nightly/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/playground-nightly/*"
