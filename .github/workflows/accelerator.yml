name: Accelerator

on:
  workflow_dispatch:
  pull_request:
    branches: [main, security-hardening]

# Cancel a superseded in-flight run when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      desktop: ${{ steps.override.outputs.relevant || steps.filter.outputs.desktop }}
      integration: ${{ steps.override.outputs.relevant || steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            # Heavy desktop/Rust/macOS jobs (clippy, test, smoke, release-smoke,
            # desktop-ui, e2e-webdriver). Retains ALL shared-infra paths so a
            # workflow / composite / lockfile / config change still reruns them —
            # only a PURE packages/sdk/src change is narrowed out (it cannot
            # affect the accelerator's Rust/app build).
            desktop:
              - 'packages/accelerator/**'
              - 'packages/sdk/package.json'
              - 'biome.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/accelerator.yml'
              - '.github/workflows/_e2e.yml'
              - '.github/workflows/_e2e-webdriver.yml'
              - '.github/actions/**'
            # SDK-against-accelerator integration (lint + the _e2e.yml SDK E2E).
            # Identical to the previous single `relevant` filter, so it still
            # runs on SDK src changes (what `desktop` skips) AND everything else.
            integration:
              - 'packages/accelerator/**'
              - 'packages/sdk/src/**'
              - 'packages/sdk/package.json'
              - 'biome.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/accelerator.yml'
              - '.github/workflows/_e2e.yml'
              - '.github/workflows/_e2e-webdriver.yml'
              - '.github/actions/**'
      - name: Override for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: override
        run: echo "relevant=true" >> "$GITHUB_OUTPUT"

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-accelerator
        with:
          rust-cache-key: accelerator-desktop-x86_64-unknown-linux-gnu
          rust-workspaces: |
            packages/accelerator/src-tauri -> target
            packages/accelerator/core -> target
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      # accelerator-core is standalone (compiled as a path-dep of src-tauri, but not lint-covered by it).
      - run: cargo fmt --check --manifest-path ../core/Cargo.toml
      - run: cargo clippy --manifest-path ../core/Cargo.toml --all-targets -- -D warnings

  test:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    # 20, not 10: warm-cache runs finish in ~4 min, but a cold rust-cache (notably on a manual
    # `gh run rerun`, which does not restore the cache) does a full workspace rebuild that can
    # exceed 10 min and time out. 20 gives a cold build headroom without masking a real hang.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-accelerator
        with:
          rust-cache-key: accelerator-desktop-x86_64-unknown-linux-gnu
          rust-workspaces: |
            packages/accelerator/src-tauri -> target
            packages/accelerator/core -> target
          rust-components: ""
      - run: cargo test
      # accelerator-core's own unit tests (113) — not exercised by `cargo test` in src-tauri.
      - run: cargo test --manifest-path ../core/Cargo.toml

  # F-004: full updater-feed sign/verify round-trip with a THROWAWAY key (no prod secret). Guards the
  # version-binding property end-to-end against tauri-CLI drift and any change to the update-manifest
  # tool: happy path (envelope -> tauri signer sign -> splice -> verify) must pass, and the F-004 splice
  # attack (bump the OUTER version while the signed envelope stays put) must be rejected. The rejection
  # logic itself is also unit-covered by accelerator-core tests above; this proves the real signing path.
  updater-feed-e2e:
    name: Updater Feed Sign/Verify E2E
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-accelerator
        with:
          rust-cache-key: accelerator-desktop-x86_64-unknown-linux-gnu
          rust-workspaces: packages/accelerator/core -> target
          rust-components: ""
          # Only the pure core example + the tauri signer are exercised — no GTK stack, no bb sidecar.
          install-tauri-system-deps: "false"
          run-prebuild: "false"
      - name: Round-trip sign + verify (throwaway key)
        run: |
          set -euo pipefail
          work="$(mktemp -d)"

          # 1. Throwaway updater keypair (never a prod secret; empty password for CI). tauri writes the
          #    private key + a .pub whose CONTENT is already base64(minisign .pub doc) — the exact format
          #    tauri.conf.json.plugins.updater.pubkey uses, so the app verifies against this same shape.
          ( cd packages/accelerator && bunx tauri signer generate --ci -p "" -w "$work/test.key" )
          cp "$work/test.key.pub" "$work/pubkey.b64"
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$work/test.key")"
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""

          # 2. Representative unsigned feed (artifact `signature` values are opaque to the manifest
          #    binding — only the manifest signature is cryptographically checked here).
          jq -n '{version:"1.2.3", notes:"ci", pub_date:"2026-01-01T00:00:00Z", platforms:{
            "linux-x86_64":{signature:"art-linux", url:"https://example.test/app.AppImage", size:111},
            "darwin-aarch64":{signature:"art-mac", url:"https://example.test/app.tar.gz", size:222}
          }}' > "$work/latest.json"

          tool() { cargo run --quiet --manifest-path packages/accelerator/core/Cargo.toml --example update-manifest -- "$@"; }

          # 3. Happy path: envelope -> sign -> splice -> verify (must exit 0).
          tool envelope --feed "$work/latest.json" > "$work/envelope.json"
          ( cd packages/accelerator && bunx tauri signer sign "$work/envelope.json" )
          tool splice --feed "$work/latest.json" --envelope "$work/envelope.json" --sig "$work/envelope.json.sig" > "$work/signed.json"
          tool verify --feed "$work/signed.json" --pubkey "$work/pubkey.b64"
          echo "happy-path verify OK"

          # 4. F-004 splice attack: bump the OUTER version; the signed envelope stays at 1.2.3. verify
          #    MUST reject (OuterMismatch). A pass here is a regression.
          jq '.version = "9.9.9"' "$work/signed.json" > "$work/tampered.json"
          if tool verify --feed "$work/tampered.json" --pubkey "$work/pubkey.b64"; then
            echo "::error::version-splice feed VERIFIED but must have been rejected (F-004 regression)"
            exit 1
          fi
          echo "splice-reject OK (F-004 downgrade attack correctly refused)"

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - name: Unit-test build scripts (copy-bb supply-chain gate)
        run: bun run --cwd packages/accelerator test:unit

  smoke:
    name: Smoke
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-accelerator
        with:
          rust-cache-key: accelerator-server-x86_64-unknown-linux-gnu
          rust-workspaces: packages/accelerator/server -> target
          rust-components: ""
          # Headless smoke: no desktop GUI libs, no bb copy (it only builds + health-checks the server).
          install-tauri-system-deps: "false"
          run-prebuild: "false"
      - name: Build headless server
        # `accelerator-server` lives in a sibling crate at `../server/`
        # — see Cargo.toml docs.
        run: cargo build --manifest-path ../server/Cargo.toml
      - name: Assert headless tree has no GUI/TLS-serving deps (core-extraction regression guard)
        # Tripwire: if a future change (or an accidental [workspace]) ever pulls the Tauri / webview /
        # TLS-serving / cert-gen tree back into the headless binary, fail loudly. Protects the ~56%
        # dependency-surface reduction from the accelerator-core extraction.
        run: |
          TREE=$(cargo tree --manifest-path ../server/Cargo.toml -p accelerator-server --edges normal --prefix none | sort -u)
          if echo "$TREE" | grep -iqE '^(tauri|tao |wry|rcgen|tokio-rustls|x509-parser|rustls-pemfile)'; then
            echo "::error::headless dep tree regressed — a GUI/TLS-serving crate leaked back in:"
            echo "$TREE" | grep -iE '^(tauri|tao |wry|rcgen|tokio-rustls|x509-parser|rustls-pemfile)'
            exit 1
          fi
          echo "headless tree clean: $(echo "$TREE" | wc -l) packages, no tauri/rcgen/tokio-rustls"
      - name: Launch and health check
        run: |
          # bb-version hook (version-only): this leg skips the full prebuild, so resolve the live @aztec/bb.js
          # version directly (no bb copy) and surface it to /health via the runtime env — core is build.rs-free,
          # so the server reads AZTEC_BB_VERSION at construct-time. Run the script by ABSOLUTE path (the job's
          # working-dir is src-tauri; a bare `bun run` would also echo a `$ …` line into the capture).
          AZTEC_BB_VERSION="$(bun "$GITHUB_WORKSPACE/packages/accelerator/scripts/bb-version.ts")"
          export AZTEC_BB_VERSION
          ../server/target/debug/accelerator-server &
          SERVER_PID=$!

          # Poll until server is ready (max 15s)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:59833/health > /dev/null 2>&1; then
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server crashed on startup"
              exit 1
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Server not ready after 15s"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 0.5
          done

          HEALTH=$(curl -sf http://127.0.0.1:59833/health || true)
          echo "Health response: $HEALTH"

          if [ -z "$HEALTH" ]; then
            echo "::error::No response from /health"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          echo "$HEALTH" | jq -e '.status == "ok"' > /dev/null
          # bb-version hook worked → /health.aztec_version reflects the injected version, not "unknown".
          echo "$HEALTH" | jq -e '.aztec_version != "unknown"' > /dev/null
          # /health.version shape-guard (non-empty string). NOTE: bb_available is INTENTIONALLY not asserted —
          # this leg skips the bb copy, so /health.bb_available is legitimately false here.
          echo "$HEALTH" | jq -e '(.version | type) == "string" and (.version | length) > 0' > /dev/null
          echo "Smoke test passed"
          kill $SERVER_PID 2>/dev/null || true

  release-smoke:
    name: Release Smoke
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-accelerator
        with:
          rust-cache-key: accelerator-server-x86_64-unknown-linux-gnu
          rust-workspaces: packages/accelerator/server -> target
          rust-components: ""
          # Release smoke: build + package only (no /health, no bb) → no desktop libs, no prebuild.
          install-tauri-system-deps: "false"
          run-prebuild: "false"
      - name: Build release headless server (linux-x86_64)
        # `accelerator-server` lives in a sibling crate at `../server/`.
        run: cargo build --release --manifest-path ../server/Cargo.toml
      - name: Package and checksum
        run: |
          cd ../server/target/release
          tar -czf accelerator-server-pr-smoke-linux-x86_64.tar.gz accelerator-server
          shasum -a 256 accelerator-server-pr-smoke-linux-x86_64.tar.gz > accelerator-server-pr-smoke-linux-x86_64.tar.gz.sha256
          shasum -a 256 -c accelerator-server-pr-smoke-linux-x86_64.tar.gz.sha256

  desktop-ui:
    name: Desktop UI Tests
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    # Headroom for a cold Playwright fill (~30 min) on a cache miss; ~2 min on a
    # cache hit, so this ceiling is a safety net that normal runs never approach.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - uses: ./.github/actions/playwright-cache
      - run: bun run --cwd packages/accelerator test:e2e:ui

  e2e:
    name: E2E
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    uses: ./.github/workflows/_e2e.yml
    with:
      build_accelerator: true

  e2e-webdriver:
    name: E2E WebDriver (${{ matrix.platform }})
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
          - platform: linux
            runner: ubuntu-latest
          - platform: windows
            runner: windows-latest
    uses: ./.github/workflows/_e2e-webdriver.yml
    with:
      runner: ${{ matrix.runner }}
      mode: dev

  windows-prebuild:
    name: Windows Prebuild Smoke
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Fetch + verify the Windows bb.exe sidecar (real copy-bb.ts path)
        run: bun run --cwd packages/accelerator prebuild
      - name: Assert the sidecar exists, runs, and is self-contained
        shell: pwsh
        run: |
          $bb = "packages/accelerator/src-tauri/binaries/bb-x86_64-pc-windows-msvc.exe"
          if (-not (Test-Path $bb)) { Write-Error "sidecar missing: $bb"; exit 1 }
          & $bb --version
          if ($LASTEXITCODE -ne 0) { Write-Error "bb.exe --version failed (exit $LASTEXITCODE)"; exit 1 }
          # Import canary: fail the gate if bb.exe ever gains a VC++ redist dependency.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -property installationPath
          $dumpbin = Get-ChildItem "$vs\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if ($dumpbin) {
            $deps = & $dumpbin.FullName /DEPENDENTS $bb
            $deps
            if ($deps | Select-String -Pattern 'VCRUNTIME140|MSVCP140|MSVCR\d') {
              Write-Error "bb.exe now depends on the VC++ redistributable — bundle it or revisit self-contained"
              exit 1
            }
            Write-Host "Import canary OK: no VC++ redist dependency"
          } else {
            Write-Warning "dumpbin not found; skipped import canary"
          }

  windows-build:
    name: Windows Build Smoke
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-accelerator
        with:
          rust-cache-key: accelerator-desktop-x86_64-pc-windows-msvc
          rust-workspaces: packages/accelerator/src-tauri -> target
          rust-components: ""
      - name: Compile + unit-test the app crate on Windows
        run: cargo test
      - name: Build the Tauri app (NSIS installer)
        working-directory: packages/accelerator
        shell: bash
        run: |
          set -euo pipefail
          # Ephemeral updater signing key — smoke only, never shipped. createUpdaterArtifacts
          # is on, so tauri build needs a key to emit the .nsis.zip + .sig.
          bunx tauri signer generate --ci -p "" -w ./smoke-updater.key
          TAURI_SIGNING_PRIVATE_KEY="$(cat ./smoke-updater.key)"
          export TAURI_SIGNING_PRIVATE_KEY
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
          bunx tauri build --bundles nsis
          rm -f ./smoke-updater.key ./smoke-updater.key.pub
      - name: Assert the NSIS installer was produced
        working-directory: packages/accelerator/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          nsis=$(find target/release/bundle -name '*-setup.exe' | head -1)
          [ -n "$nsis" ] || { echo "::error::no NSIS -setup.exe produced"; exit 1; }
          ls -la "$nsis"
          echo "Windows installer produced: $nsis"
      - name: Install + launch + probe /health (does the tray app run on the runner?)
        working-directory: packages/accelerator/src-tauri
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $nsis = Get-ChildItem -Recurse -Filter "*-setup.exe" target/release/bundle/nsis | Select-Object -First 1
          if (-not $nsis) { Write-Error "no installer"; exit 1 }
          # Scoped Defender exclusion so the UNSIGNED installer/exe isn't quarantined mid-test
          # (ephemeral runner only; %LOCALAPPDATA% is the per-user install target).
          Add-MpPreference -ExclusionPath "$env:LOCALAPPDATA" -ErrorAction SilentlyContinue
          # Silent per-user NSIS install (/S, installMode currentUser -> %LOCALAPPDATA%, no UAC).
          Write-Host "installing $($nsis.FullName) /S"
          Start-Process -FilePath $nsis.FullName -ArgumentList "/S" -Wait
          $exe = Get-ChildItem -Path "$env:LOCALAPPDATA" -Recurse -Filter "aztec-accelerator.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Error "installed aztec-accelerator.exe not found under %LOCALAPPDATA%"
            Get-ChildItem -Path "$env:LOCALAPPDATA" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName | Out-String | Write-Host
            exit 1
          }
          Write-Host "launching $($exe.FullName)"
          # Kill switch so the launched app doesn't poll the PROD updater feed / pop a prompt.
          $env:AZTEC_ACCEL_NO_UPDATE = "1"
          $proc = Start-Process -FilePath $exe.FullName -PassThru
          # Poll /health (the server binds even without a visible tray) — proves the app starts.
          $ok = $false
          for ($i = 0; $i -lt 30; $i++) {
            try {
              $h = Invoke-RestMethod -Uri "http://127.0.0.1:59833/health" -TimeoutSec 3
              if ($h.status -eq "ok") { Write-Host "/health: $($h | ConvertTo-Json -Compress)"; $ok = $true; break }
            } catch { }
            Start-Sleep -Seconds 2
          }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          if (-not $ok) {
            Write-Error "app did not serve /health within 60s — the tray/WebView2 app may not run on a windows-latest runner (risk #1)"
            exit 1
          }
          Write-Host "OK: the Windows app installs, launches, and serves /health on the runner"

  # NOTE: the Windows updater-smoke (positive + negative) is PROVEN green and now lives in
  # the release pipeline (release-accelerator.yml), not per-PR — it builds 4 app versions,
  # far too heavy for every PR. The reusable _e2e-updater-windows.yml can still be run
  # manually via workflow_dispatch.

  accelerator-status:
    name: Accelerator Status
    if: always()
    needs:
      [
        changes,
        clippy,
        test,
        updater-feed-e2e,
        lint,
        smoke,
        release-smoke,
        desktop-ui,
        e2e,
        e2e-webdriver,
        windows-prebuild,
        windows-build,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          results="${{ needs.changes.result }} ${{ needs.clippy.result }} ${{ needs.test.result }} ${{ needs.updater-feed-e2e.result }} ${{ needs.lint.result }} ${{ needs.smoke.result }} ${{ needs.release-smoke.result }} ${{ needs.desktop-ui.result }} ${{ needs.e2e.result }} ${{ needs.e2e-webdriver.result }} ${{ needs.windows-prebuild.result }} ${{ needs.windows-build.result }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
