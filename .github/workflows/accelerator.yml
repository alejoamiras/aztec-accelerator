name: Accelerator

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      relevant: ${{ steps.override.outputs.relevant || steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            relevant:
              - 'packages/accelerator/**'
              - 'packages/sdk/src/**'
              - 'biome.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/accelerator.yml'
              - '.github/workflows/_e2e.yml'
              - '.github/workflows/_e2e-webdriver.yml'
              - '.github/actions/**'
      - name: Override for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: override
        run: echo "relevant=true" >> "$GITHUB_OUTPUT"

  clippy:
    name: Clippy
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-accelerator
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-accelerator
      - run: cargo test

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  smoke:
    name: Release Smoke
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/accelerator/src-tauri
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-accelerator
      - name: Build headless server
        run: cargo build --bin accelerator-server
      - name: Launch and health check
        run: |
          ./target/debug/accelerator-server &
          SERVER_PID=$!

          # Poll until server is ready (max 15s)
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:59833/health > /dev/null 2>&1; then
              break
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "::error::Server crashed on startup"
              exit 1
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Server not ready after 15s"
              kill $SERVER_PID 2>/dev/null || true
              exit 1
            fi
            sleep 0.5
          done

          HEALTH=$(curl -sf http://127.0.0.1:59833/health || true)
          echo "Health response: $HEALTH"

          if [ -z "$HEALTH" ]; then
            echo "::error::No response from /health"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          echo "$HEALTH" | jq -e '.status == "ok"' > /dev/null
          echo "Smoke test passed"
          kill $SERVER_PID 2>/dev/null || true

  desktop-ui:
    name: Desktop UI Tests
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run --cwd packages/accelerator test:e2e:ui

  e2e:
    name: E2E
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    uses: ./.github/workflows/_e2e.yml
    secrets:
      SPONSORED_FPC_SALT: ${{ secrets.SPONSORED_FPC_SALT }}
    with:
      build_accelerator: true

  e2e-webdriver:
    name: E2E WebDriver (${{ matrix.platform }})
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
          - platform: linux
            runner: ubuntu-latest
    uses: ./.github/workflows/_e2e-webdriver.yml
    with:
      runner: ${{ matrix.runner }}
      mode: dev

  accelerator-status:
    name: Accelerator Status
    if: always()
    needs: [changes, clippy, test, lint, smoke, desktop-ui, e2e, e2e-webdriver]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          results="${{ needs.changes.result }} ${{ needs.clippy.result }} ${{ needs.test.result }} ${{ needs.lint.result }} ${{ needs.smoke.result }} ${{ needs.desktop-ui.result }} ${{ needs.e2e.result }} ${{ needs.e2e-webdriver.result }}"
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "Job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All jobs passed or were skipped"
