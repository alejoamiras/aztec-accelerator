name: Promote Latest

# Tag-only promotion of an ALREADY-PUBLISHED SDK version to npm `latest`.
# Never publishes. This is the ONLY sanctioned path that moves `latest`
# (see the guard in _publish-sdk.yml), run after the live acceptance smoke.
# It doubles as the rollback lever: dispatch with a prior version to move
# `latest` back. Honest limit: a tag move repairs nothing already installed,
# and `X.Y.Z-revision.N` fix-forwards are semver prereleases that `^X.Y.Z`
# ranges will not resolve — only bare/`latest` installers pick them up.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published SDK version to point npm `latest` at (X.Y.Z or X.Y.Z-revision.N)"
        required: true
        type: string

# Shared with _publish-sdk.yml: an in-flight npm mutation is never canceled. Caveat
# (GitHub semantics): at most ONE run waits per group — a newer dispatch replaces a
# still-queued run; confirm your run started after dispatching.
concurrency:
  group: publish-npm
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  promote:
    name: Promote to npm latest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # Stable (X.Y.Z) or our documented fix-forward format (X.Y.Z-revision.N) only.
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-revision\.[0-9]+)?$'; then
            echo "::error::'$VERSION' is not X.Y.Z or X.Y.Z-revision.N"
            exit 1
          fi

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify the version is already published
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! npm view "@alejoamiras/aztec-accelerator@$VERSION" version >/dev/null 2>&1; then
            echo "::error::@alejoamiras/aztec-accelerator@$VERSION is not on npm — this workflow never publishes"
            exit 1
          fi

      - name: Point npm latest at the version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          npm dist-tag add "@alejoamiras/aztec-accelerator@$VERSION" latest
          echo "npm latest → $VERSION"
          npm view @alejoamiras/aztec-accelerator dist-tags
