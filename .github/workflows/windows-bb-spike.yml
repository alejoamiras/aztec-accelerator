name: Windows bb.exe spike

# Throwaway P0 diagnostic for the windows-release-2026-06-02 plan.
# Proves, on the REAL windows-latest image, that the upstream Windows bb.exe:
#   1. downloads + extracts from the aztec-packages release tarball,
#   2. actually executes (`bb.exe --version`), and
#   3. is self-contained (dumpbin /DEPENDENTS shows only Windows system DLLs —
#      no VCRUNTIME140/MSVCP140 => no VC++ redistributable required).
# Also captures the tarball SHA-256 to pin in copy-bb.ts (P1).
# Triggers ONLY when this file changes. Delete once P0 is recorded.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/windows-bb-spike.yml

permissions: {}

jobs:
  spike:
    name: bb.exe runtime + dependency probe
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      BB_TAG: v4.2.0 # must match @aztec/bb.js (bun.lock) — see plan P0
      BB_ASSET: barretenberg-amd64-windows.tar.gz
    steps:
      - name: Download the Windows bb tarball
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $url = "https://github.com/AztecProtocol/aztec-packages/releases/download/$env:BB_TAG/$env:BB_ASSET"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $env:BB_ASSET
          $hash = (Get-FileHash $env:BB_ASSET -Algorithm SHA256).Hash.ToLower()
          Write-Host "SHA256(tarball) = $hash"
          "BB_TARBALL_SHA256=$hash" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Extract and list the tarball tree
        shell: pwsh
        run: |
          tar -xzf $env:BB_ASSET
          Write-Host "=== extracted tree (watch for stowaway .dll files beside bb.exe) ==="
          Get-ChildItem -Recurse -File | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Locate bb.exe
        shell: pwsh
        run: |
          $bb = Get-ChildItem -Recurse -Filter bb.exe | Select-Object -First 1
          if (-not $bb) { Write-Error "bb.exe not found in tarball"; exit 1 }
          Write-Host "bb.exe at $($bb.FullName) ($($bb.Length) bytes)"
          "BB_EXE=$($bb.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: bb.exe --version (does it execute at all?)
        shell: pwsh
        run: |
          & $env:BB_EXE --version
          Write-Host "exit code: $LASTEXITCODE"
          if ($LASTEXITCODE -ne 0) { Write-Error "bb.exe --version failed (exit $LASTEXITCODE)"; exit 1 }

      - name: bb.exe --help (do subcommands load?)
        shell: pwsh
        run: |
          # Some CLIs exit non-zero on --help; informational only, never gates.
          & $env:BB_EXE --help
          Write-Host "exit code: $LASTEXITCODE"

      - name: Dependency probe — dumpbin /DEPENDENTS (the real self-contained proof)
        shell: pwsh
        run: |
          # --version succeeding on windows-latest is NOT sufficient: the runner has
          # the VC++ redist installed, a bare user machine may not. dumpbin reveals
          # the actual import table so we know what a clean machine truly needs.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { Write-Warning "vswhere not found; skipping dumpbin"; exit 0 }
          $vs = & $vswhere -latest -property installationPath
          $dumpbin = Get-ChildItem "$vs\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $dumpbin) { Write-Warning "dumpbin not found; skipping"; exit 0 }
          Write-Host "=== dumpbin /DEPENDENTS bb.exe ==="
          & $dumpbin.FullName /DEPENDENTS $env:BB_EXE
          Write-Host ""
          Write-Host ">>> INTERPRETATION:"
          Write-Host ">>>   OK (in every Win10+):  KERNEL32 NTDLL ADVAPI32 WS2_32 BCRYPT USER32 SHELL32 PSAPI OLE32 ucrtbase api-ms-win-*"
          Write-Host ">>>   NEEDS VC++ REDIST:     VCRUNTIME140*.dll  MSVCP140*.dll   <- if present, we must bundle/install the redist"
          Write-Host ">>>   STOWAWAY:              any non-system .dll shipped beside bb.exe (see the extracted tree above)"

      - name: Summary
        shell: pwsh
        run: |
          @(
            "## Windows bb.exe spike (P0)",
            "",
            "| field | value |",
            "|---|---|",
            "| release tag | ``$env:BB_TAG`` |",
            "| asset | ``$env:BB_ASSET`` |",
            "| tarball SHA-256 | ``$env:BB_TARBALL_SHA256`` |",
            "| bb.exe | ``$env:BB_EXE`` |",
            "",
            "Read the **dumpbin /DEPENDENTS** step to confirm self-contained (no VCRUNTIME140/MSVCP140)."
          ) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
