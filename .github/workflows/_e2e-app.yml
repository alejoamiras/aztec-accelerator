name: _App E2E (reusable)

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: false
        type: string
        default: ""
      test_script:
        description: "Package script to run (e.g. test:e2e or test:e2e:smoke)"
        required: false
        type: string
        default: "test:e2e:smoke"
      aztec_node_url:
        description: Aztec node URL (skips local CLI install when not localhost)
        required: false
        type: string
        default: "http://localhost:8080"

jobs:
  e2e-app:
    name: App E2E (${{ inputs.test_script }})
    runs-on: ubuntu-latest
    # Headroom for a cold Playwright fill (~30 min) on a cache miss on top of the
    # aztec node setup + the test; ~1-2 min install on a cache hit.
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      # ── Setup & Run ───────────────────────────────────────────────
      - uses: ./.github/actions/setup-aztec
        with:
          skip_cli: ${{ inputs.aztec_node_url != 'http://localhost:8080' }}

      # Restore the headless-shell browser from the cache warmed on `main` (see
      # warm-playwright-cache.yml) instead of cold-downloading from the flaky CDN.
      - uses: ./.github/actions/playwright-cache

      - uses: ./.github/actions/start-services
        with:
          aztec_node_url: ${{ inputs.aztec_node_url }}

      - name: Run E2E tests
        env:
          AZTEC_NODE_URL: ${{ inputs.aztec_node_url }}
          TEST_SCRIPT: ${{ inputs.test_script }}
        run: bun run --cwd packages/playground "$TEST_SCRIPT"

      - name: Upload Aztec logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: aztec-node-logs-app
          path: /tmp/aztec-node.log
          if-no-files-found: ignore
          retention-days: 7
