name: Start Services
description: Start Aztec local network and wait for health checks

inputs:
  aztec_node_url:
    description: Aztec node URL (local network started only when localhost)
    required: false
    default: "http://localhost:8080"

runs:
  using: composite
  steps:
    - name: Start Aztec local network
      if: inputs.aztec_node_url == 'http://localhost:8080'
      shell: bash
      env:
        FORGE_BROADCAST_TIMEOUT: "300"
      run: aztec start --local-network > /tmp/aztec-node.log 2>&1 &

    - name: Wait for Aztec node
      shell: bash
      env:
        AZTEC_NODE_URL: ${{ inputs.aztec_node_url }}
      run: |
        for i in $(seq 1 60); do
          if curl -sf "${AZTEC_NODE_URL}/status" > /dev/null 2>&1; then
            echo "Aztec node ready (attempt $i)"
            exit 0
          fi
          sleep 10
        done
        echo "Aztec node failed to respond at ${AZTEC_NODE_URL} within 10 minutes"
        exit 1

    - name: Dump Aztec node logs on failure
      if: failure()
      shell: bash
      run: |
        echo "=== Last 100 lines of Aztec node log ==="
        tail -100 /tmp/aztec-node.log 2>/dev/null || echo "No log file found"
