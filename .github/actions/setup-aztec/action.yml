name: Setup Aztec
description: Install Bun, Foundry, and Aztec CLI. Version auto-detected from packages/sdk/package.json.

inputs:
  skip_cli:
    description: Skip Foundry + Aztec CLI install (use when targeting a remote Aztec node)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: 1.3.14

    - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: ${{ runner.os }}-bun-

    - run: bun install --frozen-lockfile
      shell: bash

    - name: Detect Aztec version
      if: inputs.skip_cli != 'true'
      id: detect
      shell: bash
      run: |
        VERSION=$(bun -e "console.log(JSON.parse(require('fs').readFileSync('packages/sdk/package.json','utf8')).devDependencies['@aztec/aztec.js'])")
        echo "Aztec version: $VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Install Node.js 24
      if: inputs.skip_cli != 'true'
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 24.18.0

    - name: Install Foundry
      if: inputs.skip_cli != 'true'
      uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1
      with:
        # Pinned, not "stable": aztec's L1 deploy wrapper (l1-contracts/scripts/forge_broadcast.js,
        # since 4.3.1) passes `--batch-size` WITHOUT `--batch`; foundry 1.7 made `--batch-size`
        # require the new `--batch` flag, so a floating stable (1.7.1) fails the deploy with
        # "required arguments were not provided: --batch". v1.4.1 is the lineage aztec bundles and
        # tests against. Revisit when aztec's wrapper supports the 1.7 CLI.
        version: v1.4.1

    - name: Cache Aztec CLI
      if: inputs.skip_cli != 'true'
      id: cache-aztec
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
      with:
        path: ~/.aztec/versions/${{ steps.detect.outputs.version }}
        key: ${{ runner.os }}-aztec-${{ steps.detect.outputs.version }}

    - name: Install Aztec CLI
      if: inputs.skip_cli != 'true' && steps.cache-aztec.outputs.cache-hit != 'true'
      shell: bash
      run: |
        export CI=1
        export FOUNDRY_DIR="$HOME/.foundry"
        curl -fsSL "https://install.aztec.network/${{ steps.detect.outputs.version }}/install" \
          | VERSION=${{ steps.detect.outputs.version }} bash
        ls -la ~/.aztec/versions/${{ steps.detect.outputs.version }}/bin/

    - name: Update PATH
      if: inputs.skip_cli != 'true'
      shell: bash
      run: |
        echo "$HOME/.aztec/versions/${{ steps.detect.outputs.version }}/bin" >> $GITHUB_PATH
        echo "$HOME/.aztec/versions/${{ steps.detect.outputs.version }}/node_modules/.bin" >> $GITHUB_PATH

    - name: Ensure foundry-toolchain forge wins over the aztec-bundled forge
      if: inputs.skip_cli != 'true'
      shell: bash
      run: |
        # The aztec bundle ships its own forge in versions/<v>/bin. Since aztec 4.3.1 the L1 deploy
        # path (l1-contracts/scripts/forge_broadcast.js) spawns bare `forge` with upstream-foundry
        # args, but the 4.3.1-bundled forge's `script` CLI is incompatible (requires `--batch`) —
        # the local network then fails L1 deploy and never comes up. The aztec bin dir was prepended
        # to PATH above (the CLI itself needs it), so neutralize just the bundled forge: the
        # foundry-toolchain forge (installed earlier in this action) must be the one that resolves.
        AZTEC_BIN="$HOME/.aztec/versions/${{ steps.detect.outputs.version }}/bin"
        if [ -x "$AZTEC_BIN/forge" ]; then
          mv "$AZTEC_BIN/forge" "$AZTEC_BIN/forge.aztec-bundled"
          echo "Renamed aztec-bundled forge out of the way: $AZTEC_BIN/forge.aztec-bundled"
        fi
        command -v forge >/dev/null || { echo "::error::no foundry-toolchain forge on PATH"; exit 1; }
        echo "forge now resolves to: $(command -v forge) ($(forge --version | head -1))"
