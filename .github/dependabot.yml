version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # @aztec/* packages are managed by scripts/update-aztec-version.ts
      # and the _aztec-update.yml workflow — not by dependabot.
      - dependency-name: "@aztec/*"
  - package-ecosystem: "cargo"
    directory: "/packages/accelerator/src-tauri"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
